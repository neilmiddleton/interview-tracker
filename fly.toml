app = "cadet-interview-tracker"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  PORT     = "8080"
  DB_PATH  = "/data/cadet-interviews.db"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source      = "cadet_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
