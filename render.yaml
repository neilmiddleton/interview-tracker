services:
  - type: web
    name: cadet-interview-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cadet-tracker-db
          property: connectionString

databases:
  - name: cadet-tracker-db
    databaseName: cadet_tracker
    plan: free
